<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Pindah</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
      max-width: 500px;
    }

    h1 {
      margin-bottom: 15px;
      font-size: 32px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background: #38bdf8;
      color: #0f172a;
      text-decoration: none;
      font-weight: bold;
      border-radius: 10px;
      transition: 0.3s;
    }

    a:hover {
      background: #0ea5e9;
      transform: scale(1.05);
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Website Telah Pindah</h1>
    
    <p>
      Website ini telah berpindah ke alamat baru.
      <br><br>
      Silakan klik tombol di bawah untuk menuju website terbaru.
    </p>

    <a href="https://laporanpiket.satpolpptebet.my.id" target="_blank">
      Kunjungi Website Baru
    </a>
  </div>

</body>
</html>
